specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Appian
providerId: appian
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Low Code
  - BPM
  - Process Automation
  - RPA
  - AI
description: Appian is priced per user, per month, per application across three named editions — Standard,
  Advanced, and Premium — distinguished by data-source breadth, RPA bot count, portal count, AI Actions
  monthly allotment (200K / 500K / 1M), and platform features. A Community Edition is offered free for
  learning/personal use. List per-user prices are not published on the marketing pricing page; quotes
  are provided through Appian sales. The Web APIs (Deployment REST, Application Package Details, Export
  Package, AI Skills, Health Check) are entitlements of the underlying edition.
sources:
  - https://appian.com/products/pricing
plans:
  - id: appian-community
    name: Community Edition
    type: freemium
    description: Free, single-developer learning environment. Not for production use.
    entries:
      - label: Single developer environment
        name: dev_environment
        type: quota
        metric: environment
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Single developer
      - name: Personal / learning use only
      - name: No production deployment
  - id: appian-standard
    name: Standard
    type: subscription
    description: Per-user, per-month, per-app entry tier with single data source (up to 4M rows), 5 RPA
      bots, 1 portal per app, basic AI Copilot, and 200K AI Actions/month.
    entries:
      - label: Per user, per month, per app
        name: user_app_month
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: AI Actions monthly allotment
        name: ai_actions
        type: quota
        metric: action
        limit: 200000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: RPA bots included
        name: rpa_bots
        type: quota
        metric: bot
        limit: 5
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Data source rows
        name: data_rows
        type: quota
        metric: row
        limit: 4000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Single data source
      - name: 5 RPA bots
      - name: 1 portal per app
      - name: AI Copilot for developers (basic)
      - name: 200K AI Actions / month
  - id: appian-advanced
    name: Advanced
    type: subscription
    description: Mid-tier with multiple data sources (20M rows), 25 RPA bots, unlimited portals, Process
      HQ, Case Management Studio, Agent Studio, Composer, and 500K AI Actions/month.
    entries:

        name: user_app_month
        type: subscription
        metric: seat
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: contact sales
        userMultiplied: true
      - label: AI Actions monthly allotment
        name: ai_actions
        type: quota
        metric: action
        limit: 500000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: RPA bots included
        name: rpa_bots
        type: quota
        metric: bot
        limit: 25
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: Data source rows
        name: data_rows
        type: quota
        metric: row
        limit: 20000000
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Multiple data sources
      - name: 25 RPA bots

specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: Appian
providerId: appian
publisherName: Appian Corporation
serviceCategory: Low-Code / Process Automation
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Low Code
  - Process Automation
  - RPA
description: 'FOCUS-aligned FinOps view for Appian: per-user / per-app / per-month subscription priced
  by named edition (Standard / Advanced / Premium). Primary cost drivers are user seats, app count, and
  AI Actions consumption (200K/500K/1M monthly cap by edition). RPA bot count and data-source row counts
  are tier-included rather than separately metered.'
sources:
  - https://appian.com/products/pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Usage
    - Adjustment
focusColumns:
  ServiceName: Appian Platform
  ServiceCategory: Low-Code / Process Automation
  ProviderName: Appian
  PublisherName: Appian Corporation
  InvoiceIssuerName: Appian Corporation
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Tiered Subscription
meters:
  - name: user_seats
    description: Active named users on the Appian platform per month
    unit: seat
    aggregation: max
    dimensions:
      - edition
      - app
  - name: applications
    description: Distinct apps in scope of the per-user-per-app subscription
    unit: app
    aggregation: max
    dimensions:
      - edition
      - environment
  - name: ai_actions
    description: AI Actions consumed against the monthly tier allotment (Copilot, Agent Studio, DocCenter)
    unit: action
    aggregation: sum
    dimensions:
      - edition
      - feature
  - name: rpa_bot_runs
    description: RPA bot executions against the bot allotment
    unit: bot-run
    aggregation: sum
    dimensions:
      - bot
      - environment
  - name: portal_traffic
    description: Portal end-user sessions for cost attribution where portals are the primary surface
    unit: session
    aggregation: sum
    dimensions:
      - portal
      - app
principles:
  - name: Visibility
    description: Use Appian's License Center, Process HQ, and AI usage dashboards to track seat utilization,
      AI Action burn-rate, and RPA bot runs.
  - name: Allocation
    description: Tag apps and processes with business-unit metadata; allocate per-user-per-app cost back
      to consuming product owners.
  - name: Optimization
    description: Right-size editions per app (Standard for transactional apps without AI; Advanced/Premium
      where AI features are exercised); reclaim inactive seats; sample AI Actions during prototyping;
      consolidate small apps to share data sources.
  - name: Accountability
    description: Center of Excellence (COE) owns the Appian contract; product owners accountable for app-level
      seat count, AI Action consumption, and RPA bot ROI.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com

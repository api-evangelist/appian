naftiko: 1.0.0-alpha2
info:
  label: Appian Application Package Details API — Packages
  description: 'Appian Application Package Details API — Packages. 1 operations. Lead operation: Appian Get application package
    details. Self-contained Naftiko capability covering one Appian business surface.'
  tags:
  - Appian
  - Packages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    APPIAN_API_KEY: APPIAN_API_KEY
capability:
  consumes:
  - type: http
    namespace: application-package-details-packages
    baseUri: https://{domain}/suite/deployment-management/v2
    description: Appian Application Package Details API — Packages business capability. Self-contained, no shared references.
    resources:
    - name: applications-applicationUuid-packages
      path: /applications/{applicationUuid}/packages
      operations:
      - name: getapplicationpackages
        method: GET
        description: Appian Get application package details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: appian-api-key
      value: '{{env.APPIAN_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: application-package-details-packages-rest
    port: 8080
    description: REST adapter for Appian Application Package Details API — Packages. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/applications/{applicationuuid}/packages
      name: applications-applicationuuid-packages
      description: REST surface for applications-applicationUuid-packages.
      operations:
      - method: GET
        name: getapplicationpackages
        description: Appian Get application package details
        call: application-package-details-packages.getapplicationpackages
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: application-package-details-packages-mcp
    port: 9090
    transport: http
    description: MCP adapter for Appian Application Package Details API — Packages. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: appian-get-application-package-details
      description: Appian Get application package details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: application-package-details-packages.getapplicationpackages
      outputParameters:
      - type: object
        mapping: $.

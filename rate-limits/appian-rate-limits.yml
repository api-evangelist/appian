specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Appian
providerId: appian
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Low Code
  - BPM
  - Appian
description: Appian does not publish numeric rate limits for its Web APIs (Deployment REST, Application
  Package Details, Export Package, Health Check, AI Skills). Effective ceilings are governed by the customer's
  Appian environment sizing (Cloud or Self-Managed) and by the AI Actions monthly allotment of the chosen
  edition (Standard 200K / Advanced 500K / Premium 1M). Heavy automation should batch requests, use webhooks
  where available, and respect 429/503 with backoff.
notes: No public per-second/per-minute numeric limits documented; AI Actions monthly cap is the only published
  quota.
sources:
  - https://docs.appian.com/suite/help/25.4/Deployment_Rest_API.html
  - https://appian.com/products/pricing
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Web API throughput
    scope: environment
    metric: varies
    limit: see environment sizing
    notes: Sized by the customer's Appian Cloud tier or self-managed deployment; not published as a fixed
      per-second number.
  - name: AI Actions monthly cap
    scope: account
    metric: actions_per_month
    limit: tier-dependent
    notes: Standard 200,000 / Advanced 500,000 / Premium 1,000,000 actions per month; overage policy is
      contract-defined.
  - name: Deployment REST API
    scope: environment
    metric: varies
    limit: see environment sizing
    notes: Used for CI/CD package import/export; rate-limited implicitly by deployment queue throughput.
policies:
  - name: Backoff Strategy
    description: Implement exponential backoff with jitter; honor Retry-After when returned. Treat 503
      as transient (Appian environment maintenance windows or scaling events).
  - name: Batch CI/CD Calls
    description: Deployment automation should serialize package import/export operations and avoid concurrent
      deploys to the same environment.
  - name: AI Actions Sampling
    description: Track AI Actions consumption mid-month to avoid overage; batch low-priority AI tasks
      to off-peak windows.
  - name: Capacity Sizing
    description: Engage Appian customer success to upsize environment when sustained API automation traffic
      pressures shared services.
maintainers:
